services:
  mysql:
    image: mysql:8.0
    container_name: octopus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev_2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-octopus_enterprise}
      MYSQL_USER: ${MYSQL_USER:-octopus}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-octopus_dev_2026}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/migrations:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: octopus-redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD:-redis_dev_2026}" --bind 0.0.0.0
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:
