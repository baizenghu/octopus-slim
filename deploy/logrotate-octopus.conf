# deploy/logrotate-octopus.conf
# 安装: sudo cp deploy/logrotate-octopus.conf /etc/logrotate.d/octopus

/var/log/octopus/*.log
/home/*/octopus-slim/.dev-logs/*.log
/home/*/octopus-slim/data/audit-logs/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
    maxsize 100M
}
