<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }}</title>
<style>
:root {
  --bg-primary: #1e293b;
  --bg-secondary: #273549;
  --accent: #3b82f6;
  --accent2: #8b5cf6;
  --accent-glow: #60a5fa;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --glass-bg: rgba(255,255,255,0.08);
  --glass-border: rgba(255,255,255,0.15);
}
{{ theme_vars }}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: "PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  overflow: hidden;
  width: 100vw; height: 100vh;
}
#viewport {
  width: 1920px; height: 1080px;
  transform-origin: top left;
  position: relative; z-index: 1;
}
.slide {
  position: absolute; top:0; left:0;
  width: 1920px; height: 1080px;
  padding: 80px 100px;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease, transform 0.5s ease;
  transform: translateX(60px);
  background:
    radial-gradient(ellipse at 10% 90%, rgba(59,130,246,0.08) 0%, transparent 45%),
    radial-gradient(ellipse at 90% 10%, rgba(139,92,246,0.06) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 50%, rgba(14,165,233,0.03) 0%, transparent 60%),
    linear-gradient(160deg, #1a2744 0%, var(--bg-primary) 40%, #1e2d47 100%) !important;
}
.slide.active {
  opacity: 1; pointer-events: auto;
  transform: translateX(0);
}
.slide.prev {
  transform: translateX(-60px);
}

/* Glass card */
.glass-card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: 32px;
  backdrop-filter: blur(12px);
  transition: transform 0.3s, box-shadow 0.3s;
  animation: pulse-glow 4s ease-in-out infinite;
}
.glass-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 32px rgba(59,130,246,0.15);
}

/* Animations */
[data-animate] {
  opacity: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
}
[data-animate="up"] { transform: translateY(40px); }
[data-animate="left"] { transform: translateX(40px); }
[data-animate="right"] { transform: translateX(-40px); }
[data-animate="scale"] { transform: scale(0.9); }
[data-animate="fly-left"] { transform: translateX(-120px) scale(0.9); opacity: 0; }
[data-animate="fly-right"] { transform: translateX(120px) scale(0.9); opacity: 0; }
[data-animate="fly-bottom"] { transform: translateY(80px) scale(0.9); opacity: 0; }
[data-animate="zoom"] { transform: scale(0.3); opacity: 0; }
[data-animate="blind"] {
  clip-path: inset(0 100% 0 0);
  opacity: 0;
  transition: clip-path 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.4s ease !important;
}
[data-animate].animated {
  opacity: 1 !important;
  transform: translateY(0) translateX(0) scale(1) !important;
}
[data-animate="blind"].animated {
  clip-path: inset(0 0 0 0) !important;
  opacity: 1 !important;
}

/* Progress bar */
#progress-bar {
  position: fixed; bottom: 0; left: 0;
  height: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.4s ease; z-index: 100;
}
#page-num {
  position: fixed; bottom: 16px; right: 32px;
  font-size: 16px; color: var(--text-secondary);
  z-index: 100;
}
.nav-btn { display: none; }

/* Slide picker */
#slide-picker {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 56px;
  background: rgba(15,23,42,0.95);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center; gap: 4px;
  padding: 0 60px;
  z-index: 200;
  transform: translateY(100%);
  transition: transform 0.3s ease;
  overflow-x: auto;
}
#slide-picker.visible { transform: translateY(0); }
#slide-picker-trigger {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 20px; z-index: 199;
}
.picker-dot {
  flex-shrink: 0;
  width: 36px; height: 36px;
  border-radius: 8px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-secondary);
  font-size: 13px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
  user-select: none;
}
.picker-dot:hover {
  background: rgba(59,130,246,0.2);
  border-color: rgba(59,130,246,0.4);
  color: #fff;
}
.picker-dot.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 0 12px rgba(59,130,246,0.4);
}

/* Common */
.slide-title {
  font-size: 48px; font-weight: 700;
  margin-bottom: 48px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 20px rgba(59,130,246,0.3));
}
.slide-subtitle {
  font-size: 24px; color: var(--text-secondary);
  margin-top: -32px; margin-bottom: 40px;
}

/* Chapter page */
.chapter-page {
  justify-content: center; align-items: center;
}
.chapter-page .chapter-num {
  font-size: 120px; font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; opacity: 0.3;
  position: absolute; top: 80px; right: 120px;
}
.chapter-page .chapter-title {
  font-size: 64px; font-weight: 700; color: var(--text-primary);
}
.chapter-page .chapter-line {
  width: 120px; height: 4px; margin-top: 24px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
}
.glow-text {
  text-shadow: 0 0 40px rgba(59,130,246,0.5), 0 0 80px rgba(59,130,246,0.3);
}
.glow-line {
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  box-shadow: 0 0 12px rgba(59,130,246,0.4);
  margin: 24px 0;
}

/* Agenda card */
.agenda-card {
  flex: 1;
  text-align: center;
  padding: 36px 20px;
  position: relative;
  overflow: hidden;
  min-height: 280px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.agenda-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  opacity: 0;
  transition: opacity 0.4s;
}
.agenda-card.animated::before { opacity: 1; }
.agenda-card .num {
  width: 64px; height: 64px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px; font-size: 26px; font-weight: 800;
  box-shadow: 0 0 24px rgba(59,130,246,0.3);
}
.agenda-card .card-title {
  font-size: 26px; font-weight: 700; margin-bottom: 12px;
}
.agenda-card .card-desc {
  font-size: 15px; color: var(--text-secondary); line-height: 1.7;
}

/* Bullet points */
.bullet-list { list-style: none; }
.bullet-list li {
  padding: 16px 0 16px 36px; font-size: 22px;
  color: var(--text-secondary); line-height: 1.6;
  position: relative; border-bottom: 1px solid var(--glass-border);
}
.bullet-list li::before {
  content: ''; position: absolute; left: 0; top: 24px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px rgba(59,130,246,0.5);
}
.bullet-list li strong { color: var(--text-primary); }

/* Two column compare */
.compare-row { display:flex; gap:40px; flex:1; }
.compare-col { flex:1; }
.compare-col h3 {
  font-size:28px; margin-bottom:24px; padding-bottom:12px;
  border-bottom: 2px solid var(--glass-border);
}
.compare-col.col-blue h3 { border-color: var(--accent); color: var(--accent-glow); }
.compare-col.col-red h3 { color: #f87171; border-color: #ef4444; }
.compare-col.col-green h3 { color: #4ade80; border-color: #22c55e; }
.compare-col.col-default h3 { color: var(--text-primary); }

.vs-item {
  display: flex; align-items: center; gap: 16px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.vs-item:last-child { border-bottom: none; }
.vs-icon {
  flex-shrink: 0;
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  border: 1.5px solid;
}
.vs-icon-blue {
  background: rgba(59,130,246,0.12);
  border-color: rgba(59,130,246,0.4);
  color: #60a5fa;
  box-shadow: 0 0 12px rgba(59,130,246,0.2);
}
.vs-icon-red {
  background: rgba(239,68,68,0.1);
  border-color: rgba(239,68,68,0.3);
  color: #f87171;
}
.vs-icon-green {
  background: rgba(34,197,94,0.12);
  border-color: rgba(34,197,94,0.3);
  color: #4ade80;
  box-shadow: 0 0 12px rgba(34,197,94,0.2);
}
.vs-icon-default {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.2);
  color: var(--text-secondary);
}

.vs-label {
  font-size: 17px; font-weight: 700; margin-bottom: 2px;
  color: var(--text-primary);
}
.vs-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.5;
}

/* Table */
svg text { font-family: "PingFang SC","Microsoft YaHei",system-ui,sans-serif; }
table {
  width: 100%; border-collapse: collapse;
}
table th {
  background: rgba(59,130,246,0.15); color: var(--accent-glow);
  padding: 16px 20px; text-align: left; font-size: 18px;
  border-bottom: 2px solid var(--accent);
}
table td {
  padding: 14px 20px; font-size: 17px; color: var(--text-secondary);
  border-bottom: 1px solid var(--glass-border);
}
table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
table tr:hover td { background: rgba(255,255,255,0.03); }

/* Quote page */
.quote-text {
  font-size: 42px; font-weight: 600; line-height: 1.6;
  color: var(--text-primary);
  text-align: center;
  max-width: 1200px;
  position: relative;
  padding: 40px 60px;
}
.quote-text::before {
  content: '\201C';
  font-size: 120px; font-weight: 800;
  position: absolute; top: -30px; left: -10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  opacity: 0.3;
}
.quote-label {
  margin-top: 40px;
  font-size: 20px; font-weight: 600;
  color: var(--accent-glow);
  letter-spacing: 4px;
}

/* Pulsing glow */
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 8px rgba(59,130,246,0.2); }
  50% { box-shadow: 0 0 24px rgba(59,130,246,0.5), 0 0 48px rgba(59,130,246,0.2); }
}

/* Global ambient glow */
body::before {
  content: '';
  position: fixed; top: -20%; left: -15%;
  width: 55%; height: 55%;
  background: radial-gradient(ellipse, rgba(59,130,246,0.1) 0%, transparent 65%);
  z-index: 0; pointer-events: none;
  animation: drift1 20s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; bottom: -20%; right: -15%;
  width: 55%; height: 55%;
  background: radial-gradient(ellipse, rgba(139,92,246,0.08) 0%, transparent 65%);
  z-index: 0; pointer-events: none;
  animation: drift2 25s ease-in-out infinite alternate;
}
@keyframes drift1 {
  0% { transform: translate(0, 0); }
  100% { transform: translate(80px, 40px); }
}
@keyframes drift2 {
  0% { transform: translate(0, 0); }
  100% { transform: translate(-60px, -50px); }
}

/* Particle canvas */
#particle-canvas {
  position: fixed; top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 0; pointer-events: none;
}
</style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<div id="viewport">

{{ slides_content }}

</div><!-- viewport -->
<div id="progress-bar"></div>
<div id="page-num"></div>
<div id="slide-picker-trigger"></div>
<div id="slide-picker"></div>

<script>
// Slide system
const slides = document.querySelectorAll('.slide');
let current = 0;
const total = slides.length;
const progressBar = document.getElementById('progress-bar');
const pageNum = document.getElementById('page-num');

function showSlide(idx) {
  if (idx < 0 || idx >= total) return;

  slides.forEach((s) => {
    s.querySelectorAll('[data-animate]').forEach(el => {
      el.classList.remove('animated');
    });
    s.classList.remove('active', 'prev');
  });

  for (let i = 0; i < idx; i++) slides[i].classList.add('prev');

  void slides[idx].offsetHeight;

  slides[idx].classList.add('active');
  current = idx;
  progressBar.style.width = ((idx + 1) / total * 100) + '%';
  pageNum.textContent = (idx + 1) + ' / ' + total;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const elems = slides[idx].querySelectorAll('[data-animate]');
      elems.forEach((el, i) => {
        const hasDelay = el.style.transitionDelay && el.style.transitionDelay !== '0s';
        if (hasDelay) {
          el.classList.add('animated');
        } else {
          setTimeout(() => el.classList.add('animated'), i * 150);
        }
      });
    });
  });
}

// Fullscreen toggle
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); showSlide(current + 1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); showSlide(current - 1); }
  if (e.key === 'Home') { e.preventDefault(); showSlide(0); }
  if (e.key === 'End') { e.preventDefault(); showSlide(total - 1); }
  if (e.key === 'F5' || e.key === 'F11') { e.preventDefault(); toggleFullscreen(); }
});

// Double click to toggle fullscreen
document.addEventListener('dblclick', (e) => {
  e.preventDefault();
  toggleFullscreen();
});

// Mouse click: only edge 15% triggers prev/next
let clickTimer = null;
document.addEventListener('click', (e) => {
  if (e.target.closest('.nav-btn') || e.target.closest('a') || e.target.closest('button') || e.target.closest('#slide-picker')) return;
  if (e.detail >= 2) return;
  const w = window.innerWidth;
  const edgeZone = w * 0.15;
  if (e.clientX > edgeZone && e.clientX < w - edgeZone) return;
  clearTimeout(clickTimer);
  clickTimer = setTimeout(() => {
    if (e.clientX <= edgeZone) {
      showSlide(current - 1);
    } else {
      showSlide(current + 1);
    }
  }, 250);
});

document.addEventListener('dblclick', () => { clearTimeout(clickTimer); });

// Mouse wheel with debounce
let wheelLock = false;
document.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (wheelLock) return;
  wheelLock = true;
  if (e.deltaY > 0) { showSlide(current + 1); }
  else if (e.deltaY < 0) { showSlide(current - 1); }
  setTimeout(() => { wheelLock = false; }, 600);
}, { passive: false });

// Scale viewport
function scaleViewport() {
  const vp = document.getElementById('viewport');
  const sw = window.innerWidth / 1920;
  const sh = window.innerHeight / 1080;
  const scale = Math.min(sw, sh);
  vp.style.transform = 'scale(' + scale + ')';
  const marginLeft = (window.innerWidth - 1920 * scale) / 2;
  const marginTop = (window.innerHeight - 1080 * scale) / 2;
  vp.style.marginLeft = marginLeft + 'px';
  vp.style.marginTop = marginTop + 'px';
}

window.addEventListener('resize', scaleViewport);
scaleViewport();
showSlide(0);

// Slide picker
(function() {
  const picker = document.getElementById('slide-picker');
  const trigger = document.getElementById('slide-picker-trigger');
  let hideTimer = null;

  for (let i = 0; i < total; i++) {
    const dot = document.createElement('div');
    dot.className = 'picker-dot' + (i === 0 ? ' active' : '');
    dot.textContent = i + 1;
    dot.addEventListener('click', (e) => {
      e.stopPropagation();
      showSlide(i);
    });
    picker.appendChild(dot);
  }

  const pickerDots = picker.querySelectorAll('.picker-dot');
  function updatePicker() {
    pickerDots.forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });
  }

  const origPageNum = document.getElementById('page-num');
  new MutationObserver(updatePicker).observe(origPageNum, { childList: true, characterData: true, subtree: true });

  function showPicker() {
    clearTimeout(hideTimer);
    picker.classList.add('visible');
  }
  function hidePicker() {
    hideTimer = setTimeout(() => picker.classList.remove('visible'), 800);
  }

  trigger.addEventListener('mouseenter', showPicker);
  picker.addEventListener('mouseenter', showPicker);
  picker.addEventListener('mouseleave', hidePicker);
  picker.addEventListener('click', (e) => e.stopPropagation());
})();

// Particle data stream background
(function() {
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  const particles = [];
  const PARTICLE_COUNT = 80;
  const DATA_STREAMS = 6;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.vx = (Math.random() - 0.5) * 0.4;
      this.vy = (Math.random() - 0.5) * 0.4;
      this.r = Math.random() * 1.5 + 0.5;
      this.alpha = Math.random() * 0.4 + 0.1;
      const hue = 210 + Math.random() * 50;
      this.color = 'hsla(' + hue + ', 80%, 65%, ' + this.alpha + ')';
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < 0 || this.x > W) this.vx *= -1;
      if (this.y < 0 || this.y > H) this.vy *= -1;
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
    }
  }

  class DataStream {
    constructor() { this.reset(); }
    reset() {
      const edge = Math.floor(Math.random() * 4);
      if (edge === 0) { this.x = -10; this.y = Math.random() * H; this.vx = 1.5 + Math.random(); this.vy = (Math.random() - 0.5) * 0.8; }
      else if (edge === 1) { this.x = W + 10; this.y = Math.random() * H; this.vx = -(1.5 + Math.random()); this.vy = (Math.random() - 0.5) * 0.8; }
      else if (edge === 2) { this.x = Math.random() * W; this.y = -10; this.vy = 1.5 + Math.random(); this.vx = (Math.random() - 0.5) * 0.8; }
      else { this.x = Math.random() * W; this.y = H + 10; this.vy = -(1.5 + Math.random()); this.vx = (Math.random() - 0.5) * 0.8; }
      this.trail = [];
      this.maxTrail = 20 + Math.floor(Math.random() * 15);
      this.hue = 210 + Math.random() * 40;
      this.size = 2 + Math.random() * 2;
    }
    update() {
      this.trail.push({ x: this.x, y: this.y });
      if (this.trail.length > this.maxTrail) this.trail.shift();
      this.x += this.vx;
      this.y += this.vy;
      this.vx += (Math.random() - 0.5) * 0.02;
      this.vy += (Math.random() - 0.5) * 0.02;
      if (this.x < -50 || this.x > W + 50 || this.y < -50 || this.y > H + 50) this.reset();
    }
    draw() {
      for (let i = 0; i < this.trail.length; i++) {
        const t = this.trail[i];
        const alpha = (i / this.trail.length) * 0.4;
        const size = (i / this.trail.length) * this.size;
        ctx.beginPath();
        ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
        ctx.fillStyle = 'hsla(' + this.hue + ', 80%, 65%, ' + alpha + ')';
        ctx.fill();
      }
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = 'hsla(' + this.hue + ', 80%, 75%, 0.8)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
      ctx.fillStyle = 'hsla(' + this.hue + ', 80%, 65%, 0.1)';
      ctx.fill();
    }
  }

  for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
  const streams = [];
  for (let i = 0; i < DATA_STREAMS; i++) streams.push(new DataStream());

  function animate() {
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < particles.length; i++) {
      particles[i].update();
      particles[i].draw();
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          const alpha = (1 - dist / 150) * 0.12;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = 'rgba(96, 165, 250, ' + alpha + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    for (const s of streams) {
      s.update();
      s.draw();
    }
    requestAnimationFrame(animate);
  }
  animate();
})();
